name: memoli-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
          version: '~> v2'

      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run --cwd packages/memoli test
      - run: bun run memoli:release:check

      - name: Snapshot release
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: bun run memoli:release:snapshot

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        run: |
          version="$(node -p "require('./packages/memoli/package.json').version")"
          expected_tag="v${version}"
          if [ "${GITHUB_REF_NAME}" != "${expected_tag}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match packages/memoli version ${version}" >&2
            exit 1
          fi

          bun run memoli:release

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: memoli-release
          path: |
            dist/goreleaser/**
